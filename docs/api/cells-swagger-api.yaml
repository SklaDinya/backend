openapi: 3.0.0

info:
    version: v1
    title: API для работы с ячейками в сервисе по бронированию камер хранения

tags:
    -   name: cells
        description: Камеры хранения

paths:
    /api/v1/storages/{storageId}/cells:
        get:
            tags:
                - cells
            summary: Найти камеры хранения
            parameters:
                -   name: storageId
                    in: path
                    required: true
                    description: Идентификатор пункта хранения
                    schema:
                        type: string
                        format: uuid
                -   name: startBooking
                    in: query
                    required: true
                    description: Время начала бронирования
                    schema:
                        type: string
                        format: date-time
                        example: 2001-09-11T08:00:00Z
                -   name: timeBooking
                    in: query
                    required: true
                    description: Время бронирования
                    schema:
                        type: string
                        format: duration
                        example: P3D
                -   name: cellClasses
                    in: query
                    required: false
                    description: Классы ячеек
                    schema:
                        type: array
                        items:
                            type: string
                            example: Обычная
                -   name: pageNumber
                    in: query
                    required: false
                    description: Номер страницы
                    schema:
                        type: integer
                        format: int32
                        example: 0
                -   name: pageSize
                    in: query
                    required: false
                    description: Размер страницы
                    schema:
                        type: integer
                        format: int32
                        example: 50
            responses:
                '200':
                    description: Данные получены
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/CellGet'
                '400':
                    description: Некорректные параметры поиска
                '404':
                    description: Пункт хранения не найден
                '500':
                    description: Ошибки сервера
    /api/v1/storages/{storageId}/cells/classes:
        get:
            tags:
                - cells
            summary: Получить классы камер хранения
            parameters:
                -   name: storageId
                    in: path
                    required: true
                    description: Идентификатор пункта хранения
                    schema:
                        type: string
                        format: uuid
            responses:
                '200':
                    description: Данные получены
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: string
                                    example: Обычная
                '404':
                    description: Пункт хранения не найден
                '500':
                    description: Ошибки сервера
    /api/v1/storages/my/cells:
        get:
            tags:
                - cells
            summary: Найти камеры хранения
            security:
                -   JWTBearer: [ ]
            parameters:
                -   name: cellClasses
                    in: query
                    required: false
                    description: Классы ячеек
                    schema:
                        type: array
                        items:
                            type: string
                            example: Обычная
                -   name: pageNumber
                    in: query
                    required: false
                    description: Номер страницы
                    schema:
                        type: integer
                        format: int32
                        example: 0
                -   name: pageSize
                    in: query
                    required: false
                    description: Размер страницы
                    schema:
                        type: integer
                        format: int32
                        example: 50
            responses:
                '200':
                    description: Данные получены
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/CellGet'
                '400':
                    description: Некорректные параметры поиска
                '401':
                    description: Пользователь не авторизован
                '403':
                    description: Пользователь не имеет прав на эту операцию
                '500':
                    description: Ошибки сервера
        post:
            tags:
                - cells
            summary: Добавить камеру хранения
            security:
                -   JWTBearer: [ ]
            requestBody:
                description: Форма для создания камеры хранения
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CellCreate'
            responses:
                '201':
                    description: Камера хранения создана
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CellGet'
                '400':
                    description: Некорректные данные формы создания камеры хранения
                '401':
                    description: Пользователь не авторизован
                '403':
                    description: Пользователь не имеет прав на эту операцию
                '405':
                    description: Сервер запущен только на чтение
                '409':
                    description: Камера хранения с таким названием уже существует
                '500':
                    description: Ошибки сервера
    /api/v1/storages/my/cells/classes:
        get:
            tags:
                - cells
            summary: Получить классы камер хранения
            security:
                -   JWTBearer: [ ]
            responses:
                '200':
                    description: Данные получены
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: string
                                    example: Обычная
                '401':
                    description: Пользователь не авторизован
                '403':
                    description: Пользователь не имеет прав на эту операцию
                '500':
                    description: Ошибки сервера

components:
    schemas:
        CellCreate:
            $ref: '../dtos/cells/cell-create.schema.yaml'
        CellGet:
            $ref: '../dtos/cells/cell-get.schema.yaml'
    securitySchemes:
        JWTBearer:
            $ref: '../security/jwt.schema.yaml'
