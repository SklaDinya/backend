openapi: 3.0.0

info:
    version: v1
    title: API для работы с операторами в сервисе по бронированию камер хранения

tags:
    -   name: operators
        description: Операторы

paths:
    /api/v1/storages/my/operators:
        get:
            tags:
                - operators
            summary: Найти операторов
            security:
                -   JWTBearer: [ ]
            parameters:
                -   name: username
                    in: query
                    required: false
                    description: Логин оператора
                    schema:
                        type: string
                        example: g1gachad
                -   name: name
                    in: query
                    required: false
                    description: Имя оператора
                    schema:
                        type: string
                        example: Зубенко Михаил Петрович
                -   name: email
                    in: query
                    required: false
                    description: Почта оператора
                    schema:
                        type: string
                        example: a@b.c
                -   name: role
                    in: query
                    required: false
                    description: Роль оператора
                    schema:
                        $ref: '#/components/schemas/OperatorRole'
                -   name: pageNumber
                    in: query
                    required: false
                    description: Номер страницы
                    schema:
                        type: integer
                        format: int32
                        example: 0
                -   name: pageSize
                    in: query
                    required: false
                    description: Размер страницы
                    schema:
                        type: integer
                        format: int32
                        example: 50
            responses:
                '200':
                    description: Данные получены
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/OperatorGet'
                '400':
                    description: Некорректные параметры поиска
                '401':
                    description: Пользователь не авторизован
                '403':
                    description: Пользователь не имеет прав на эту операцию
                '500':
                    description: Ошибки сервера
        post:
            tags:
                - operators
            summary: Создать оператора
            security:
                -   JWTBearer: [ ]
            requestBody:
                description: Форма для создания оператора
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/OperatorCreate'
            responses:
                '201':
                    description: Оператор создан
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/OperatorGet'
                '400':
                    description: Некорректные данные формы создания оператора
                '401':
                    description: Пользователь не авторизован
                '403':
                    description: Пользователь не имеет прав на эту операцию
                '405':
                    description: Сервер запущен только на чтение
                '409':
                    description: Пользователь с таким логином или почтой уже существует
                '500':
                    description: Ошибки сервера

    /api/v1/storages/my/operators/{operatorId}:
        get:
            tags:
                - operators
            summary: Просмотреть данные аккаунта оператора
            security:
                -   JWTBearer: [ ]
            parameters:
                -   name: operatorId
                    in: path
                    required: true
                    description: Идентификатор оператора
                    schema:
                        type: string
                        format: uuid
            responses:
                '200':
                    description: Данные получены
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/OperatorGet'
                '400':
                    description: Некорректные параметры запроса
                '401':
                    description: Пользователь не авторизован
                '403':
                    description: Пользователь не имеет прав на эту операцию
                '404':
                    description: Оператор не найден
                '500':
                    description: Ошибки сервера
        patch:
            tags:
                - operators
            summary: Обновить данные аккаунта оператора
            security:
                -   JWTBearer: [ ]
            parameters:
                -   name: operatorId
                    in: path
                    required: true
                    description: Идентификатор оператора
                    schema:
                        type: string
                        format: uuid
            requestBody:
                description: Форма для обновления аккаунта оператора
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/OperatorUpdate'
            responses:
                '200':
                    description: Данные обновлены
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/OperatorGet'
                '400':
                    description: Некорректные данные формы обновления
                '401':
                    description: Пользователь не авторизован
                '403':
                    description: Пользователь не имеет прав на эту операцию
                '404':
                    description: Пользователь не найден
                '405':
                    description: Сервер запущен только на чтение
                '409':
                    description: Пользователь с таким логином или почтой уже существует
                '500':
                    description: Ошибки сервера

components:
    schemas:
        OperatorCreate:
            $ref: '../dtos/operators/operator-create.schema.yaml'
        OperatorGet:
            $ref: '../dtos/operators/operator-get.schema.yaml'
        OperatorUpdate:
            $ref: '../dtos/operators/operator-update.schema.yaml'
        OperatorRole:
            $ref: '../dtos/operators/operator-role.schema.yaml'
    securitySchemes:
        JWTBearer:
            $ref: '../security/jwt.schema.yaml'
