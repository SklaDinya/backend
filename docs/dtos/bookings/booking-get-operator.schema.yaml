description: Данные о бронировании для оператора пункта бронирования
type: object
required:
    - id
    - userId
    - user
    - storageId
    - cells
    - startTime
    - bookingTime
    - createdAt
    - status
properties:
    id:
        description: Идентификатор бронирования
        type: string
        format: uuid
    userId:
        description: Идентификатор пользователя
        type: string
        format: uuid
    user:
        $ref: 'booking-user.schema.yaml'
    storageId:
        description: Идентификатор пункта хранения
        type: string
        format: uuid
    cells:
        description: Список забронированных ячеек
        type: array
        items:
            $ref: '../cells/cell-get.schema.yaml'
    startTime:
        description: Время начала бронирования
        type: string
        format: date-time
        example: 2001-09-11T08:00:00Z
    bookingTime:
        description: Длительность бронирования
        type: string
        format: duration
    price:
        description: Цена
        type: number
        example: 993
    createdAt:
        description: Время создания бронирования
        type: string
        format: date-time
        example: 2001-09-11T08:46:26Z
    status:
        $ref: 'booking-status.schema.yaml'