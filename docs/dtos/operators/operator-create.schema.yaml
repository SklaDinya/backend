description: Форма для создания оператора пункта
type: object
required:
    - username
    - password
    - name
    - role
properties:
    username:
        description: Логин оператора
        type: string
        example: g1gachad
    password:
        description: Пароль оператора
        type: string
        example: qwerty123
    name:
        description: Имя оператора
        type: string
        example: Зубенко Михаил Петрович
    email:
        description: Почта оператора
        type: string
        example: a@b.c
    role:
        $ref: 'operator-role.schema.yaml'