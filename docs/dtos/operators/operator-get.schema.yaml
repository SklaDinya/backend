description: Данные об операторе
type: object
required:
    - id
    - username
    - name
    - role
    - banned
    - createdAt
    - updatedAt
properties:
    id:
        description: Идентификатор оператора
        type: string
        format: uuid
    username:
        description: Логин пользователя
        type: string
        example: g1gachad
    name:
        description: Имя оператора
        type: string
        example: Зубенко Михаил Петрович
    email:
        description: Почта оператора
        type: string
        example: a@b.c
    role:
        $ref: 'operator-role.schema.yaml'
    banned:
        description: Заблокирован ли аккаунт
        type: boolean
        example: false
    createdAt:
        description: Время создания аккаунта
        type: string
        format: date-time
        example: 2001-09-11T08:46:26Z
    updatedAt:
        description: Время последнего обновления аккаунта
        type: string
        format: date-time
        example: 2001-09-11T09:03:02Z