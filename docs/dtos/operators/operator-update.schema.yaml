description: Форма для обновления оператора
type: object
properties:
    username:
        description: Логин оператора
        type: string
        example: g1gachad
    password:
        description: Пароль оператора
        type: string
        example: qwerty123
    name:
        description: Имя оператора
        type: string
        example: Зубенко Михаил Петрович
    email:
        description: Почта оператора
        type: string
        example: a@b.c
    role:
        $ref: 'operator-role.schema.yaml'
    banned:
        description: Заблокирован ли аккаунт
        type: boolean
        example: false