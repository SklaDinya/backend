description: Данные о пункте хранения
type: object
required:
    - id
    - name
    - address
    - status
    - createdAt
    - updatedAt
properties:
    id:
        description: Идентификатор пункта хранения
        type: string
        format: uuid
    name:
        description: Название пункта хранения
        type: string
        example: Хранилище "У Рязановой"
    address:
        description: Адрес пункта хранения
        type: string
        example: Ленинградская область, г. Мурино, ул. Меллстроя, д. 13, стр. 66
    description:
        description: Описание пункта хранения
        type: string
        example: Лучший пункт хранения в Мурино! 100-процентная гарантия защиты ваших вещей от всяких фогов!
    status:
        $ref: 'storage-status.schema.yaml'
    createdAt:
        description: Время создания аккаунта
        type: string
        format: date-time
        example: 2001-09-11T08:46:26Z
    updatedAt:
        description: Время последнего обновления аккаунта
        type: string
        format: date-time
        example: 2001-09-11T09:03:02Z