description: Данные о пользователе для пользователя
type: object
required:
    - id
    - username
    - name
    - role
properties:
    id:
        description: Идентификатор пользователя
        type: string
        format: uuid
    username:
        description: Логин пользователя
        type: string
        example: g1gachad
    name:
        description: Имя пользователя
        type: string
        example: Зубенко Михаил Петрович
    email:
        description: Почта пользователя
        type: string
        example: a@b.c
    role:
        $ref: 'user-role.schema.yaml'