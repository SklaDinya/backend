spring:
    application:
        name: skladinya-app
    config:
        import: "optional:file:../.env"
    jpa:
        open-in-view: false
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
    level:
        org.hibernate.SQL: debug
        redis: debug

management:
    endpoints:
        web:
            exposure:
                include: health
    endpoint:
        health:
            show-details: always