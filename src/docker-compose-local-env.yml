services:
    postgres:
        image: postgres:18.3
        container_name: db-postgres
        restart: unless-stopped
        env_file:
            - .env
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "${POSTGRES_PORT}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql
    redis:
        image: redis:8.6-alpine
        restart: unless-stopped
        ports:
            - "${REDIS_PORT}:6379"

volumes:
    postgres_data:

# Для запуска: docker-compose -f docker-compose-local-env.yml up -d
# Для остановки: docker-compose -f docker-compose-local-env.yml down